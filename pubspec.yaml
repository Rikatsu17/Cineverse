name: cineverse
description: movies

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.7.0 <4.0.0"
dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # UI
  flutter_adaptive_scaffold: ^0.3.3
  cached_network_image: ^3.4.1
  flutter_svg: ^2.2.0
  auto_size_text: ^3.0.0
  shimmer: ^3.0.0
  google_fonts: ^6.3.0
  animations: ^2.0.11

  # State
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^16.0.0

  # Networking
  http: ^1.4.0
  chopper: ^8.4.0

  # JSON
  json_annotation: ^4.9.0
  freezed_annotation: ^3.1.0

  # Local storage
  shared_preferences: ^2.5.3

  # Database
  drift: ^2.28.1
  sqlite3: ^2.9.0
  sqlite3_flutter_libs: ^0.5.39
  path_provider: ^2.1.5
  path: ^1.9.0

  # Firebase
  firebase_auth: ^6.5.1
  firebase_core: ^4.0.0
  cloud_firestore: ^6.0.0

  # Utils
  intl: ^0.20.2
  logging: ^1.3.0