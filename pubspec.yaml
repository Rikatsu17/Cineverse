name: cineverse
description: A CineVerse movie application.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.7.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # UI & Design
  flutter_adaptive_scaffold: ^0.3.3
  cached_network_image: ^3.4.1
  flutter_svg: ^2.2.0
  auto_size_text: ^3.0.0
  shimmer: ^3.0.0
  google_fonts: ^6.3.0
  animations: ^2.0.11

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.0

  # Navigation
  go_router: ^16.0.0

  # Networking
  http: ^1.4.0
  chopper: ^8.4.0

  # Serialization & Models
  json_annotation: ^4.9.0
  freezed_annotation: ^3.1.0

  # Local storage & Database
  shared_preferences: ^2.5.3
  drift: ^2.28.1
  sqlite3: ^2.9.0
  sqlite3_flutter_libs: ^0.5.39
  path_provider: ^2.1.5
  path: ^1.9.0

  # Firebase
  firebase_auth: ^6.5.1
  firebase_core: ^4.0.0
  cloud_firestore: ^6.0.0

  # Utilities
  intl: ^0.20.2
  logging: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: ^2.4.9

  freezed: any
  json_serializable: any
  riverpod_generator: any
  drift_dev: any
  chopper_generator: any

flutter:
  uses-material-design: true